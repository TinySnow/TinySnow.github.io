# Build and deploy mdBook site to GitHub Pages
name: Deploy mdBook site to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 快速失败入口：
  # - 计算本次 push 的 git 范围（before..after）
  # - 拦截不应入库的文件（敏感信息/临时文件/超大文件）
  preflight:
    runs-on: ubuntu-latest
    outputs:
      git_range: ${{ steps.compute_range.outputs.git_range }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 统一计算 range，后续 metadata 生成与 RSS 生成都共用该值。
      - name: Compute git diff range
        id: compute_range
        shell: bash
        run: |
          set -Eeuo pipefail

          ZERO_SHA="0000000000000000000000000000000000000000"
          EMPTY_TREE="$(git hash-object -t tree /dev/null)"
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [[ -z "${AFTER}" ]]; then
            AFTER="$(git rev-parse HEAD)"
          fi

          if [[ -z "${BEFORE}" || "${BEFORE}" == "${ZERO_SHA}" ]]; then
            if git rev-parse "${AFTER}^" >/dev/null 2>&1; then
              RANGE="${AFTER}^..${AFTER}"
            else
              RANGE="${EMPTY_TREE}..${AFTER}"
            fi
          else
            RANGE="${BEFORE}..${AFTER}"
          fi

          echo "git_range=${RANGE}" >> "${GITHUB_OUTPUT}"
          echo "BLOG_GIT_RANGE=${RANGE}"

      # 这一步失败时，通常不必查看后续构建日志，先修正提交内容即可。
      - name: Preflight checks (fail fast)
        env:
          BLOG_GIT_RANGE: ${{ steps.compute_range.outputs.git_range }}
        shell: bash
        run: |
          set -Eeuo pipefail

          bad=0

          while IFS= read -r -d '' file; do
            [[ -z "${file}" ]] && continue

            if [[ "${file}" =~ (^|/)\.env($|\.) ]]; then
              echo "::error file=${file}::Blocked sensitive env file."
              bad=1
            fi

            if [[ "${file}" =~ (\.pem$|\.p12$|\.pfx$|\.key$|(^|/)id_rsa($|\.pub$)) ]]; then
              echo "::error file=${file}::Blocked key/certificate-like file."
              bad=1
            fi

            if [[ "${file}" =~ (^|/)\.DS_Store$ || "${file}" =~ (~$|\.tmp$|\.swp$|\.bak$) ]]; then
              echo "::error file=${file}::Blocked temporary/system file."
              bad=1
            fi

            if [[ -f "${file}" ]]; then
              size_bytes="$(wc -c < "${file}" | tr -d '[:space:]')"
              if (( size_bytes > 5242880 )); then
                echo "::error file=${file}::Blocked large file (>5MB)."
                bad=1
              fi
            fi
          done < <(git diff --name-only -z "${BLOG_GIT_RANGE}")

          if (( bad )); then
            echo "Preflight failed."
            exit 1
          fi

          echo "Preflight checks passed."

  # 元数据生成：
  # - 生成 src/last-updated.md
  # - 生成 rss.xml
  # 产物通过 artifact 传给 build_site，避免 job 之间文件系统不共享的问题。
  generate_metadata:
    runs-on: ubuntu-latest
    needs: preflight

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 关键：last-updated 的“历史保留”依赖上一轮生成结果。
      # 若每次都从仓库原始文件起步（不恢复上一轮 artifact），就只能看到 1 条最新记录。
      - name: Resolve previous successful workflow run
        id: prev_run
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = 'mdbook.yml';
            const branch = context.ref.replace('refs/heads/', '');

            const resp = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id,
              branch,
              status: 'success',
              per_page: 20,
            });

            const currentRunId = Number(context.runId);
            const previous = resp.data.workflow_runs.find((run) => run.id !== currentRunId);
            core.setOutput('run_id', previous ? String(previous.id) : '');

      # 从上一轮成功运行下载 metadata，作为本轮生成输入基线。
      # continue-on-error 保证首次运行或历史 artifact 过期时仍可继续构建。
      - name: Download previous metadata artifact
        if: steps.prev_run.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: blog-metadata
          run-id: ${{ steps.prev_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ci-prev-artifact

      # 若成功拿到上一轮 last-updated，则先恢复它，再追加本轮变更记录。
      - name: Restore previous last-updated baseline
        if: hashFiles('ci-prev-artifact/src/last-updated.md') != ''
        shell: bash
        run: |
          set -Eeuo pipefail
          cp -v ci-prev-artifact/src/last-updated.md src/last-updated.md

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      # 使用 commit range 与 CI 事件保持一致，避免本地 staged 语义差异。
      - name: Generate Last Updated
        shell: bash
        env:
          BLOG_GIT_RANGE: ${{ needs.preflight.outputs.git_range }}
        run: |
          set -Eeuo pipefail
          chmod +x ./generate-last-updated-md.sh
          ./generate-last-updated-md.sh --range "${BLOG_GIT_RANGE}"

      # RSS_GIT_RANGE 与 Last Updated 使用同一 range，保证两者变更来源一致。
      - name: Generate RSS feed
        env:
          RSS_GIT_RANGE: ${{ needs.preflight.outputs.git_range }}
        run: |
          inv ver
          inv gen

      # upload-artifact@v4 默认不上传隐藏目录，使用非隐藏目录避免静默跳过。
      - name: Pack metadata artifact
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ci-artifact/src
          cp -v src/last-updated.md ci-artifact/src/last-updated.md
          cp -v rss.xml ci-artifact/rss.xml

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: blog-metadata
          path: ci-artifact
          if-no-files-found: error

  # 站点构建：
  # - 下载并应用 metadata 产物
  # - mdbook build
  # - 生成 sitemap
  # - 上传 pages artifact
  build_site:
    runs-on: ubuntu-latest
    needs: generate_metadata

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download metadata artifact
        uses: actions/download-artifact@v4
        with:
          name: blog-metadata
          path: ci-artifact

      # 将上游 job 产物覆盖到当前工作区后再构建，确保构建输入可复现。
      - name: Apply generated metadata files
        shell: bash
        run: |
          set -Eeuo pipefail
          cp -v ci-artifact/src/last-updated.md src/last-updated.md
          cp -v ci-artifact/rss.xml rss.xml

      - name: Install mdBook
        run: |
          curl --proto '=https' --tlsv1.2 https://sh.rustup.rs -sSf -y | sh
          rustup update
          cargo install mdbook

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 这里仅需 sscli，不依赖项目 lockfile，避免 npm ci 在无 lockfile 场景失败。
      - name: Install Node dependencies
        run: npm install -g static-sitemap-cli

      - name: Build with mdBook
        run: mdbook build

      # sitemap 直接从构建后的 book 目录生成，不再本地提交 src/sitemap*.*
      - name: Generate sitemap
        run: sscli -b https://tinysnow.github.io -r ./book

      - name: Copy rss.xml to book directory
        run: cp -v rss.xml book/

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book

  # 部署阶段：
  # 只负责将 build_site 上传的 Pages artifact 发布到 github-pages 环境。
  deploy:
    runs-on: ubuntu-latest
    needs: build_site
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
